<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QRDonate Embed Example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      font-family: Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #191f28;
    }
    main {
      width: min(100%, 720px);
      padding: 32px;
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #6b7684;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>외부 프로그램 삽입 예제</h1>
    <p>QRDonate 서버가 실행 중이면 아래 script 한 줄로 송금 QR 화면이 붙습니다.</p>
    <script src="http://localhost:8787/api/qr-donate/widget.js"></script>
  </main>
</body>
</html>
